<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} — {{ site.Title }}{{ end }}</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  {{ block "main" . }}{{ end }}
  <script>
    document.querySelectorAll('.idea').forEach(details => {
      details.addEventListener('toggle', () => {
        if (details.open) {
          document.querySelectorAll('.idea[open]').forEach(other => {
            if (other !== details) other.open = false;
          });
        }
      });
    });

    document.querySelectorAll('.idea-export').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idea = btn.closest('.idea');
        idea.classList.add('print-active');
        window.onafterprint = () => idea.classList.remove('print-active');
        window.print();
      });
    });
  </script>
</body>
</html>
